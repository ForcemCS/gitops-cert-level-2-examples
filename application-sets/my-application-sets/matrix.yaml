apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-git
  namespace: argocd
spec:
  generators:
    - matrix:
        generators:
          # 发现 Git 仓库中的应用目录
          - git:
              repoURL: https://github.com/codefresh-contrib/gitops-cert-level-2-examples.git
              revision: HEAD
              directories:
                - path: application-sets/example-apps/*

          # 发现 Argo CD 中注册的所有集群
          - clusters:
              selector:
                matchLabels:
                  argocd.argoproj.io/secret-type: cluster

  template:
    metadata:
      # 每个应用 × 每个集群生成一个唯一的 Application
      name: "{{path.basename}}-{{name}}"

    spec:
      project: default

      source:
        repoURL: https://github.com/codefresh-contrib/gitops-cert-level-2-examples.git
        targetRevision: HEAD
        path: "{{path}}"

      destination:
        server: "{{server}}"
        namespace: "{{path.basename}}"

      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
